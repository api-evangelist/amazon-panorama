aid: amazon-panorama
name: Amazon Panorama
description: >-
  AWS Panorama is a machine learning appliance and software development kit (SDK) that brings computer vision to
  on-premises cameras. It allows organizations to automate visual inspection tasks, such as gauging production line
  efficiency or identifying bottlenecks in industrial operations.
