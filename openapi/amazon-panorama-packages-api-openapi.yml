servers:
- url: http://panorama.{region}.amazonaws.com
  variables:
    region:
      description: The AWS region
      enum:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - us-gov-west-1
      - us-gov-east-1
      - ca-central-1
      - eu-north-1
      - eu-west-1
      - eu-west-2
      - eu-west-3
      - eu-central-1
      - eu-south-1
      - af-south-1
      - ap-northeast-1
      - ap-northeast-2
      - ap-northeast-3
      - ap-southeast-1
      - ap-southeast-2
      - ap-east-1
      - ap-south-1
      - sa-east-1
      - me-south-1
      default: us-east-1
  description: The Panorama multi-region endpoint
- url: https://panorama.{region}.amazonaws.com
  variables:
    region:
      description: The AWS region
      enum:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - us-gov-west-1
      - us-gov-east-1
      - ca-central-1
      - eu-north-1
      - eu-west-1
      - eu-west-2
      - eu-west-3
      - eu-central-1
      - eu-south-1
      - af-south-1
      - ap-northeast-1
      - ap-northeast-2
      - ap-northeast-3
      - ap-southeast-1
      - ap-southeast-2
      - ap-east-1
      - ap-south-1
      - sa-east-1
      - me-south-1
      default: us-east-1
  description: The Panorama multi-region endpoint
- url: http://panorama.{region}.amazonaws.com.cn
  variables:
    region:
      description: The AWS region
      enum:
      - cn-north-1
      - cn-northwest-1
      default: cn-north-1
  description: The Panorama endpoint for China (Beijing) and China (Ningxia)
- url: https://panorama.{region}.amazonaws.com.cn
  variables:
    region:
      description: The AWS region
      enum:
      - cn-north-1
      - cn-northwest-1
      default: cn-north-1
  description: The Panorama endpoint for China (Beijing) and China (Ningxia)
security:
- hmac: []
tags:
- name: Packages
paths:
  /packages/template-job:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: CreateNodeFromTemplateJob
      description: Creates a camera stream node.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateNodeFromTemplateJobResponse'
              examples:
                CreateNodeFromTemplateJob200Example:
                  summary: Default CreateNodeFromTemplateJob 200 response
                  x-microcks-default: true
                  value:
                    JobId: resource-abc123
        '480':
          description: ConflictException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictException'
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - NodeName
              - OutputPackageName
              - OutputPackageVersion
              - TemplateParameters
              - TemplateType
              properties:
                JobTags:
                  description: Tags for the job.
                  type: array
                  items:
                    $ref: '#/components/schemas/JobResourceTags'
                NodeDescription:
                  description: A description for the node.
                  type: string
                  pattern: ^.*$
                  minLength: 0
                  maxLength: 255
                NodeName:
                  description: A name for the node.
                  type: string
                  pattern: ^[a-zA-Z0-9\-\_]+$
                  minLength: 1
                  maxLength: 128
                OutputPackageName:
                  description: An output package name for the node.
                  type: string
                  pattern: ^[a-zA-Z0-9\-\_]+$
                  minLength: 1
                  maxLength: 128
                OutputPackageVersion:
                  description: An output package version for the node.
                  type: string
                  pattern: ^([0-9]+)\.([0-9]+)$
                  minLength: 1
                  maxLength: 255
                TemplateParameters:
                  description: Template parameters for the node.
                  type: object
                  additionalProperties:
                    $ref: '#/components/schemas/TemplateValue'
                TemplateType:
                  description: The type of node.
                  type: string
                  enum:
                  - RTSP_CAMERA_STREAM
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      summary: Amazon Panorama Create Node from Template Job
      tags:
      - Packages
    get:
      operationId: ListNodeFromTemplateJobs
      description: Returns a list of camera stream node jobs.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListNodeFromTemplateJobsResponse'
              examples:
                ListNodeFromTemplateJobs200Example:
                  summary: Default ListNodeFromTemplateJobs 200 response
                  x-microcks-default: true
                  value:
                    NextToken: example-string
                    NodeFromTemplateJobs: example-string
        '480':
          description: ConflictException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictException'
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters:
      - name: MaxResults
        in: query
        required: false
        description: The maximum number of node from template jobs to return in one page of results.
        schema:
          type: integer
          minimum: 0
          maximum: 25
      - name: NextToken
        in: query
        required: false
        description: Specify the pagination token from a previous request to retrieve the next page of results.
        schema:
          type: string
          pattern: ^.+$
          minLength: 1
          maxLength: 4096
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      summary: Amazon Panorama List Node from Template Jobs
      tags:
      - Packages
  /packages:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: CreatePackage
      description: Creates a package and storage location in an Amazon S3 access point.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePackageResponse'
              examples:
                CreatePackage200Example:
                  summary: Default CreatePackage 200 response
                  x-microcks-default: true
                  value:
                    Arn: arn:aws:service:us-east-1:123456789012:resource/example
                    PackageId: resource-abc123
                    StorageLocation: example-string
        '480':
          description: ConflictException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictException'
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - PackageName
              properties:
                PackageName:
                  description: A name for the package.
                  type: string
                  pattern: ^[a-zA-Z0-9\-\_]+$
                  minLength: 1
                  maxLength: 128
                Tags:
                  description: Tags for the package.
                  type: object
                  minProperties: 0
                  maxProperties: 50
                  additionalProperties:
                    $ref: '#/components/schemas/TagValue'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      summary: Amazon Panorama Create Package
      tags:
      - Packages
    get:
      operationId: ListPackages
      description: Returns a list of packages.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPackagesResponse'
              examples:
                ListPackages200Example:
                  summary: Default ListPackages 200 response
                  x-microcks-default: true
                  value:
                    NextToken: example-string
                    Packages: example-string
        '480':
          description: ConflictException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictException'
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '484':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters:
      - name: maxResults
        in: query
        required: false
        description: The maximum number of packages to return in one page of results.
        schema:
          type: integer
          minimum: 0
          maximum: 25
      - name: nextToken
        in: query
        required: false
        description: Specify the pagination token from a previous request to retrieve the next page of results.
        schema:
          type: string
          pattern: ^.+$
          minLength: 1
          maxLength: 4096
      - name: MaxResults
        in: query
        schema:
          type: string
        description: Pagination limit
        required: false
      - name: NextToken
        in: query
        schema:
          type: string
        description: Pagination token
        required: false
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      summary: Amazon Panorama List Packages
      tags:
      - Packages
  /packages/import-jobs:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: CreatePackageImportJob
      description: Imports a node package.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePackageImportJobResponse'
              examples:
                CreatePackageImportJob200Example:
                  summary: Default CreatePackageImportJob 200 response
                  x-microcks-default: true
                  value:
                    JobId: resource-abc123
        '480':
          description: ConflictException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictException'
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - ClientToken
              - InputConfig
              - JobType
              - OutputConfig
              properties:
                ClientToken:
                  description: A client token for the package import job.
                  type: string
                  pattern: ^[a-zA-Z0-9\-\_]+$
                  minLength: 1
                  maxLength: 64
                InputConfig:
                  description: A configuration for a package import job.
                  type: object
                  properties:
                    PackageVersionInputConfig:
                      allOf:
                      - $ref: '#/components/schemas/PackageVersionInputConfig'
                      - description: The package version's input configuration.
                JobTags:
                  description: Tags for the package import job.
                  type: array
                  items:
                    $ref: '#/components/schemas/JobResourceTags'
                JobType:
                  description: A job type for the package import job.
                  type: string
                  enum:
                  - NODE_PACKAGE_VERSION
                  - MARKETPLACE_NODE_PACKAGE_VERSION
                OutputConfig:
                  description: An output configuration for a package import job.
                  type: object
                  properties:
                    PackageVersionOutputConfig:
                      allOf:
                      - $ref: '#/components/schemas/PackageVersionOutputConfig'
                      - description: The package version's output configuration.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      summary: Amazon Panorama Create Package Import Job
      tags:
      - Packages
    get:
      operationId: ListPackageImportJobs
      description: Returns a list of package import jobs.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPackageImportJobsResponse'
              examples:
                ListPackageImportJobs200Example:
                  summary: Default ListPackageImportJobs 200 response
                  x-microcks-default: true
                  value:
                    NextToken: example-string
                    PackageImportJobs: example-string
        '480':
          description: ConflictException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictException'
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters:
      - name: MaxResults
        in: query
        required: false
        description: The maximum number of package import jobs to return in one page of results.
        schema:
          type: integer
          minimum: 0
          maximum: 25
      - name: NextToken
        in: query
        required: false
        description: Specify the pagination token from a previous request to retrieve the next page of results.
        schema:
          type: string
          pattern: ^.+$
          minLength: 1
          maxLength: 4096
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      summary: Amazon Panorama List Package Import Jobs
      tags:
      - Packages
  /packages/{PackageId}:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    delete:
      operationId: DeletePackage
      description: <p>Deletes a package.</p> <note> <p>To delete a package, you need permission to call <code>s3:DeleteObject</code> in addition to permissions for the AWS Panorama API.</p> </note>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletePackageResponse'
        '480':
          description: ConflictException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictException'
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '484':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters:
      - name: ForceDelete
        in: query
        required: false
        description: Delete the package even if it has artifacts stored in its access point. Deletes the package's artifacts from Amazon S3.
        schema:
          type: boolean
      - name: PackageId
        in: path
        required: true
        description: The package's ID.
        schema:
          type: string
          pattern: ^[a-zA-Z0-9\-\_\/]+$
          minLength: 1
          maxLength: 255
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      summary: Amazon Panorama Delete Package
      tags:
      - Packages
  /packages/{PackageId}/versions/{PackageVersion}/patch/{PatchVersion}:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    delete:
      operationId: DeregisterPackageVersion
      description: Deregisters a package version.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeregisterPackageVersionResponse'
        '480':
          description: ConflictException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictException'
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '484':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters:
      - name: OwnerAccount
        in: query
        required: false
        description: An owner account.
        schema:
          type: string
          pattern: ^[0-9a-z\_]+$
          minLength: 1
          maxLength: 12
      - name: PackageId
        in: path
        required: true
        description: A package ID.
        schema:
          type: string
          pattern: ^[a-zA-Z0-9\-\_\/]+$
          minLength: 1
          maxLength: 255
      - name: PackageVersion
        in: path
        required: true
        description: A package version.
        schema:
          type: string
          pattern: ^([0-9]+)\.([0-9]+)$
          minLength: 1
          maxLength: 255
      - name: PatchVersion
        in: path
        required: true
        description: A patch version.
        schema:
          type: string
          pattern: ^[a-z0-9]+$
          minLength: 1
          maxLength: 255
      - name: UpdatedLatestPatchVersion
        in: query
        required: false
        description: If the version was marked latest, the new version to maker as latest.
        schema:
          type: string
          pattern: ^[a-z0-9]+$
          minLength: 1
          maxLength: 255
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      summary: Amazon Panorama Deregister Package Version
      tags:
      - Packages
    put:
      operationId: RegisterPackageVersion
      description: Registers a package version.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterPackageVersionResponse'
        '480':
          description: ConflictException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictException'
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters:
      - name: PackageId
        in: path
        required: true
        description: A package ID.
        schema:
          type: string
          pattern: ^[a-zA-Z0-9\-\_\/]+$
          minLength: 1
          maxLength: 255
      - name: PackageVersion
        in: path
        required: true
        description: A package version.
        schema:
          type: string
          pattern: ^([0-9]+)\.([0-9]+)$
          minLength: 1
          maxLength: 255
      - name: PatchVersion
        in: path
        required: true
        description: A patch version.
        schema:
          type: string
          pattern: ^[a-z0-9]+$
          minLength: 1
          maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MarkLatest:
                  description: Whether to mark the new version as the latest version.
                  type: boolean
                OwnerAccount:
                  description: An owner account.
                  type: string
                  pattern: ^[0-9a-z\_]+$
                  minLength: 1
                  maxLength: 12
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      summary: Amazon Panorama Register Package Version
      tags:
      - Packages
  /packages/template-job/{JobId}:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    get:
      operationId: DescribeNodeFromTemplateJob
      description: Returns information about a job to create a camera stream node.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeNodeFromTemplateJobResponse'
