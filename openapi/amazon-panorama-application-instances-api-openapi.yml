      - DEPLOYMENT_REQUESTED
      - DEPLOYMENT_IN_PROGRESS
      - DEPLOYMENT_ERROR
      - DEPLOYMENT_SUCCEEDED
      - REMOVAL_PENDING
      - REMOVAL_REQUESTED
      - REMOVAL_IN_PROGRESS
      - REMOVAL_FAILED
      - REMOVAL_SUCCEEDED
